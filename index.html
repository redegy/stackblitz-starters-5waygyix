<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Neon XR Lobby</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  .clickable { cursor: pointer; }
</style>
</head>

<body>

<a-scene background="color: black" vr-mode-ui="enabled: true">

  <!-- 🌌 WORLD -->
  <a-entity id="world"></a-entity>

  <!-- 💡 LIGHTS -->
  <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
  <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

  <!-- 🎥 CAMERA -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-entity cursor="rayOrigin: mouse"
                raycaster="objects: .clickable"></a-entity>
    </a-camera>

    <!-- VR controllers -->
    <a-entity laser-controls="hand: right"></a-entity>
    <a-entity laser-controls="hand: left"></a-entity>
  </a-entity>

  <!-- 📦 MENU ROOM -->
  <a-entity id="menuRoom" visible="true" position="0 1.6 -3">

    <!-- 📦 GLB BANNER (TOP CENTER) -->
    <a-entity id="banner"
      gltf-model="url(2311bannerstatic.glb)"
      position="0 1.3 0"
      scale="2.3 2.3 2.3">
    </a-entity>

    <!-- 🎮 GAMES -->
    <a-entity class="clickable" onclick="goRoom('games')"
      geometry="primitive: plane; height: 0.6; width: 1.6"
      material="color: black; opacity: 0.01"
      position="-1.8 0 0">

      <a-text value="GAMES"
        color="white"
        align="center"
        width="4"
        position="0 0 0.01">
      </a-text>
    </a-entity>

    <!-- 🛒 SHOP -->
    <a-entity class="clickable" onclick="goRoom('shop')"
      geometry="primitive: plane; height: 0.6; width: 1.6"
      material="color: black; opacity: 0.01"
      position="0 0 0">

      <a-text value="SHOP"
        color="white"
        align="center"
        width="4"
        position="0 0 0.01">
      </a-text>
    </a-entity>

    <!-- ✨ MAGIC -->
    <a-entity class="clickable" onclick="goRoom('magic')"
      geometry="primitive: plane; height: 0.6; width: 1.6"
      material="color: black; opacity: 0.01"
      position="1.8 0 0">

      <a-text value="MAGIC"
        color="white"
        align="center"
        width="4"
        position="0 0 0.01">
      </a-text>
    </a-entity>

  </a-entity>

  <!-- 🎮 GAMES ROOM -->
  <a-entity id="gamesRoom" visible="false">
    <a-text value="🎮 GAMES ROOM"
      color="#ff00ff"
      position="0 1.6 -3"
      width="8"
      align="center"></a-text>

    <a-text value="Back"
      class="clickable"
      onclick="goRoom('menu')"
      color="white"
      position="0 0.8 -3"
      align="center"></a-text>
  </a-entity>

  <!-- 🛒 SHOP ROOM -->
  <a-entity id="shopRoom" visible="false">
    <a-text value="🛒 SHOP ROOM"
      color="#00ffff"
      position="0 1.6 -3"
      width="8"
      align="center"></a-text>

    <a-text value="Back"
      class="clickable"
      onclick="goRoom('menu')"
      color="white"
      position="0 0.8 -3"
      align="center"></a-text>
  </a-entity>

  <!-- ✨ MAGIC ROOM -->
  <a-entity id="magicRoom" visible="false">
    <a-text value="✨ MAGIC ROOM"
      color="#ffff00"
      position="0 1.6 -3"
      width="8"
      align="center"></a-text>

    <a-text value="Back"
      class="clickable"
      onclick="goRoom('menu')"
      color="white"
      position="0 0.8 -3"
      align="center"></a-text>
  </a-entity>

</a-scene>

<script>

// 🧭 ROOM SYSTEM
function goRoom(room) {

  document.getElementById("menuRoom").setAttribute("visible", false);
  document.getElementById("gamesRoom").setAttribute("visible", false);
  document.getElementById("shopRoom").setAttribute("visible", false);
  document.getElementById("magicRoom").setAttribute("visible", false);

  const banner = document.getElementById("banner");

  if (room === "menu") {
    document.getElementById("menuRoom").setAttribute("visible", true);
    banner.setAttribute("visible", true);
  }

  if (room === "games") {
    document.getElementById("gamesRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }

  if (room === "shop") {
    document.getElementById("shopRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }

  if (room === "magic") {
    document.getElementById("magicRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }
}

// 🌌 SIMPLE BACKGROUND WORLD (optional, keep your own if you want)
const world = document.getElementById("world");

const colors = ["#ff00ff", "#00ffff", "#ffff00", "#ff8800"];

for (let i = 0; i < 600; i++) {
  const box = document.createElement("a-box");

  box.setAttribute("position",
    `${(Math.random()-0.5)*20} ${(Math.random()-0.5)*10} ${(Math.random()-0.5)*20}`
  );

  const size = Math.random()*0.04 + 0.01;

  box.setAttribute("width", size);
  box.setAttribute("height", size);
  box.setAttribute("depth", size);

  box.setAttribute("color", colors[Math.floor(Math.random()*colors.length)]);

  world.appendChild(box);
}

</script>

</body>
</html>
