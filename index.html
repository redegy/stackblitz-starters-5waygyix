<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Neon XR Lobby</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  .clickable { cursor: pointer; }
</style>
</head>

<body>

<a-scene background="color: black" vr-mode-ui="enabled: true">

  <!-- 🌌 WORLD -->
  <a-entity id="world"></a-entity>

  <!-- 💡 LIGHTS -->
  <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
  <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

  <!-- 🎥 CAMERA -->
  <a-entity position="0 10 0">
    <a-camera><<a-entity cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"></a-entity>/a-camera>
  </a-entity>

<a-entity id="rig">
  <a-camera>
    <a-cursor 
      raycaster="objects: .clickable"
      color="green"
      fuse="false">
    </a-cursor>
  </a-camera>
</a-entity>
  
  <!-- 📦 BANNER -->
  <a-entity id="banner" visible="true"
  gltf-model="url(2311bannerstatic.glb)"  
  position="0.2 3 -3" 
  scale="2.3 2.3 2.3">
</a-entity>

  <!-- 🧭 MENU -->
<!-- 🏠 MENU ROOM -->
<a-entity id="menuRoom" visible="true">
  <a-entity id="menu" position="-0.3 2 -3">

    <a-text value="GAMES"
      color="white"
      width="4"
      scale="1.4 1.4 1.4"
      position="-1.5 0 0"
      class="clickable"
      onclick="goRoom('games')"></a-text>

    <a-text value="SHOP"
      color="white"
      width="4"
      scale="1.4 1.4 1.4"
      position="0 0 0"
      class="clickable"
      onclick="goRoom('shop')"></a-text>

    <a-text value="MAGIC"
      color="white"
      width="4"
      scale="1.4 1.4 1.4"
      position="1.5 0 0"
      class="clickable"
      onclick="goRoom('magic')"></a-text>

  </a-entity>
</a-entity>

<!-- 🎮 GAMES ROOM -->
<a-entity id="gamesRoom" visible="false">
  <a-text value="🎮 GAMES ROOM"
    color="#ff00ff"
    position="0 1.6 -3"
    width="8"></a-text>

  <a-text value="Back"
    color="white"
    position="0 0.8 -3"
    class="clickable"
    onclick="goRoom('menu')"></a-text>
</a-entity>

<!-- 🛒 SHOP ROOM -->
<a-entity id="shopRoom" visible="false">
  <a-text value="🛒 SHOP ROOM"
    color="#00ffff"
    position="0 1.6 -3"
    width="8"></a-text>

  <a-text value="Back"
    color="white"
    position="0 0.8 -3"
    class="clickable"
    onclick="goRoom('menu')"></a-text>
</a-entity>

<!-- ✨ MAGIC ROOM -->
<a-entity id="magicRoom" visible="false">
  <a-text value="✨ MAGIC ROOM"
    color="#ffff00"
    position="0 1.6 -3"
    width="8"></a-text>

  <a-text value="Back"
    color="white"
    position="0 0.8 -3"
    class="clickable"
    onclick="goRoom('menu')"></a-text>
</a-entity>
<a-entity cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>
<a-entity laser-controls="hand: left"></a-entity>
</a-scene>

<script>

function showPage(page) {
  document.getElementById("menu").setAttribute("visible", page === "menu");
  document.getElementById("gamesPage").setAttribute("visible", page === "games");
  document.getElementById("shopPage").setAttribute("visible", page === "shop");
  document.getElementById("magicPage").setAttribute("visible", page === "magic");
}

/* 🎮 NEW: OPEN SUBWAY SURFERS */
function openGames() {
  openURL("https://subway-surfers.gg/");
}

function openShop() {
  openURL("https://example.com/shop");
}

function openMagic() {
  openURL("https://example.com/magic");
}

// VR-safe link handler
function openURL(url) {
  const isVR = navigator.xr && navigator.xr.isSessionSupported;

  // safest universal method
  if (document.fullscreenElement || isVR) {
    // VR/immersive mode fallback
    window.location.href = url;
  } else {
    // normal desktop
    window.open(url, "_blank");
  }
}

// 🌈 WORLD
const world = document.getElementById("world");

const colors = [
  "#ff00ff", "#00ffff", "#ffff00",
  "#ff2d55", "#00ff88", "#6a00ff",
  "#00aaff", "#ff8800"
];

const count = 1200;

for (let i = 0; i < count; i++) {
  const box = document.createElement("a-box");

  const x = (Math.random() - 0.5) * 28;
  const y = (Math.random() - 0.5) * 18;
  const z = (Math.random() - 0.5) * 28;

  const size = Math.random() * 0.045 + 0.015;

  const color = colors[Math.floor(Math.random() * colors.length)];

  box.setAttribute("position", `${x} ${y} ${z}`);
  box.setAttribute("width", size);
  box.setAttribute("height", size);
  box.setAttribute("depth", size);
  box.setAttribute("color", color);
  box.setAttribute("metalness", 0);
  box.setAttribute("roughness", 0);

  world.appendChild(box);
}

// 🌌 WORLD DRIFT
let t = 0;

function animateWorld() {
  t += 0.003;

  world.setAttribute(
    "position",
    `${Math.sin(t) * 0.18} ${Math.cos(t * 0.7) * 0.12} ${Math.sin(t * 0.6) * 0.18}`
  );

  requestAnimationFrame(animateWorld);
}

animateWorld();

/* 🖼 IMAGES */
window.addEventListener("DOMContentLoaded", () => {
  const world = document.getElementById("world");

  const images = [
    {
      src: "845522ef-e685-4e1d-9ba5-af935869f2bf.jpg",
      position: { x: 0, y: 0, z: -2 },
      scale: { x: 0.5, y: 0.5, z: 0.5 }
    },
    {
      src: "845522ef-e685-4e1d-9ba5-af935869f2bf.jpg",
      position: { x: 6, y: 5, z: -6 },
      scale: { x: 0.51, y: 0.51, z: 0.51 }
    }
  ];

  images.forEach((imgData) => {
    const img = document.createElement("a-image");

    const p = imgData.position;
    const s = imgData.scale;

    img.setAttribute("position", `${p.x} ${p.y} ${p.z}`);
    img.setAttribute("scale", `${s.x} ${s.y} ${s.z}`);
    img.setAttribute("src", imgData.src);

    img.setAttribute(
      "material",
      "shader: flat; transparent: true; side: double"
    );

    world.appendChild(img);
  });
});
function goRoom(room) {
  document.getElementById("menuRoom").setAttribute("visible", false);
  document.getElementById("gamesRoom").setAttribute("visible", false);
  document.getElementById("shopRoom").setAttribute("visible", false);
  document.getElementById("magicRoom").setAttribute("visible", false);

  const banner = document.getElementById("banner");

  if (room === "menu") {
    document.getElementById("menuRoom").setAttribute("visible", true);
    banner.setAttribute("visible", true);
  }

  if (room === "games") {
    document.getElementById("gamesRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }

  if (room === "shop") {
    document.getElementById("shopRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }

  if (room === "magic") {
    document.getElementById("magicRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }
}
</script>

</body>
</html>
