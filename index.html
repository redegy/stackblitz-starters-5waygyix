<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Neon XR Lobby</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      .clickable { cursor: pointer; }
    </style>
  </head>

  <body>

    <a-scene background="color: black" vr-mode-ui="enabled: true">

      <!-- 🌌 WORLD -->
      <a-entity id="world"></a-entity>

      <!-- 💡 STRONGER LIGHT (prevents dull gray look) -->
      <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

      <!-- 🎥 CAMERA -->
      <a-entity position="0 1.6 0">
        <a-camera></a-camera>
      </a-entity>

      <!-- 📦 BANNER -->
      <a-entity 
      gltf-model="url(https://redegy.github.io/stackblitz-starters-5waygyix/2311bannerstatic.glb)"  
  position="0.2 3 -3" 
  scale="2.3 2.3 2.3">
</a-entity>

      <!-- 🧭 MENU -->
      <a-entity id="menu" position="-0.3 2 -3">

        <a-text value="GAMES"
                color="white"
                width="4"
                scale="1.4 1.4 1.4"
                position="-1.5 0 0"
                class="clickable"
                onclick="showPage('games')"></a-text>

        <a-text value="SHOP"
                color="#white"
                width="4"
                scale="1.4 1.4 1.4"
                position="0 0 0"
                class="clickable"
                onclick="showPage('shop')"></a-text>

        <a-text value="MAGIC"
                color="white"
                width="4"
                scale="1.4 1.4 1.4"
                position="1.5 0 0"
                class="clickable"
                onclick="showPage('magic')"></a-text>

      </a-entity>

      <!-- PAGES -->
      <a-entity id="gamesPage" visible="false">
        <a-text value="🎮 GAMES" color="#ff00ff"></a-text>
        <a-text value="Back" onclick="showPage('menu')"></a-text>
      </a-entity>

      <a-entity id="shopPage" visible="false">
        <a-text value="🛒 SHOP" color="#00ffff"></a-text>
        <a-text value="Back" onclick="showPage('menu')"></a-text>
      </a-entity>

      <a-entity id="magicPage" visible="false">
        <a-text value="✨ MAGIC" color="#ffff00"></a-text>
        <a-text value="Back" onclick="showPage('menu')"></a-text>
      </a-entity>

    </a-scene>

    <script>
      function showPage(page) {
        document.getElementById("menu").setAttribute("visible", page === "menu");
        document.getElementById("gamesPage").setAttribute("visible", page === "games");
        document.getElementById("shopPage").setAttribute("visible", page === "shop");
        document.getElementById("magicPage").setAttribute("visible", page === "magic");
      }

      // 🌈 PURE NEON GLITTER (NO GRAY ALLOWED)
      const world = document.getElementById("world");

      const colors = [
        "#ff00ff", "#00ffff", "#ffff00",
        "#ff2d55", "#00ff88", "#6a00ff",
        "#00aaff", "#ff8800"
      ];

      const count = 1200;

      for (let i = 0; i < count; i++) {
        const box = document.createElement("a-box");

        const x = (Math.random() - 0.5) * 28;
        const y = (Math.random() - 0.5) * 18;
        const z = (Math.random() - 0.5) * 28;

        const size = Math.random() * 0.045 + 0.015;

        const color = colors[Math.floor(Math.random() * colors.length)];

        box.setAttribute("position", `${x} ${y} ${z}`);
        box.setAttribute("width", size);
        box.setAttribute("height", size);
        box.setAttribute("depth", size);

        // 🔥 KEY FIX: strong color, no dull shading tricks
        box.setAttribute("color", color);
        box.setAttribute("metalness", 0);
        box.setAttribute("roughness", 0);

        world.appendChild(box);
      }

      let t = 0;

// 🌌 WORLD DRIFT (kept, but smoother)
function animateWorld() {
  t += 0.003;

  world.setAttribute(
    "position",
    `${Math.sin(t) * 0.18} ${Math.cos(t * 0.7) * 0.12} ${Math.sin(t * 0.6) * 0.18}`
  );

  requestAnimationFrame(animateWorld);
}

animateWorld();
      window.addEventListener("DOMContentLoaded", () => {
  const world = document.getElementById("world");

  const images = [
    {
      src: "https://redegy.github.io/stackblitz-starters-5waygyix/845522ef-e685-4e1d-9ba5-af935869f2bf.jpg",
      position: { x: 0, y: 0, z: -2 },
      scale: { x: 0.5, y: 0.5, z: 0.5 }
    },
    {
      src: "https://redegy.github.io/stackblitz-starters-5waygyix/845522ef-e685-4e1d-9ba5-af935869f2bf.jpg",
      position: { x: 6, y: 5, z: -6 },
      scale: { x: 0.51, y: 0.51, z: 0.51 }
    }
    
  ];

  images.forEach((imgData) => {
    const img = document.createElement("a-image");

    // POSITION
    const p = imgData.position;
    img.setAttribute("position", `${p.x} ${p.y} ${p.z}`);

    // SCALE (IMPORTANT PART YOU ASKED FOR)
    const s = imgData.scale;
    img.setAttribute("scale", `${s.x} ${s.y} ${s.z}`);

    // IMAGE SOURCE
    img.setAttribute("src", imgData.src);

    // FIX BLACK BOX ISSUE
    img.setAttribute(
      "material",
      "shader: flat; transparent: true; side: double"
    );

    world.appendChild(img);
  });
});
    </script>

  </body>
</html>
