<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Neon XR Lobby</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  .clickable { cursor: pointer; }
</style>
</head>

<body>

<a-scene background="color: black">

  <!-- 🌌 WORLD -->
  <a-entity id="world"></a-entity>

  <!-- 💡 LIGHTS -->
  <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
  <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

  <!-- 🎥 CAMERA -->
  <a-entity position="0 1.6 0">
    <a-camera>
      <a-entity cursor="rayOrigin: mouse"
                raycaster="objects: .clickable"></a-entity>
    </a-camera>
  </a-entity>

  <!-- 📦 MENU ROOM -->
  <a-entity id="menuRoom" visible="true" position="0 1.6 -3">

    <!-- 📦 GLB BANNER -->
    <a-entity id="banner"
      gltf-model="url(2311bannerstatic.glb)"
      position="0 1.3 0"
      scale="2.3 2.3 2.3">
    </a-entity>

    <!-- 🎮 GAMES -->
    <a-entity class="clickable" data-room="games"
      geometry="primitive: plane; height: 0.6; width: 1.6"
      material="color: black; opacity: 0.01"
      position="-1.8 0 0">

      <a-text value="GAMES" color="white" align="center"></a-text>
    </a-entity>

    <!-- 🛒 SHOP -->
    <a-entity class="clickable" data-room="shop"
      geometry="primitive: plane; height: 0.6; width: 1.6"
      material="color: black; opacity: 0.01"
      position="0 0 0">

      <a-text value="SHOP" color="white" align="center"></a-text>
    </a-entity>

    <!-- ✨ MAGIC -->
    <a-entity class="clickable" data-room="magic"
      geometry="primitive: plane; height: 0.6; width: 1.6"
      material="color: black; opacity: 0.01"
      position="1.8 0 0">

      <a-text value="MAGIC" color="white" align="center"></a-text>
    </a-entity>

  </a-entity>

  <!-- 🎮 GAMES ROOM -->
  <a-entity id="gamesRoom" visible="false">

    <a-text value="🎮 GAMES ROOM"
      color="#ff00ff"
      position="0 1.6 -3"
      align="center"
      width="8"></a-text>

    <a-entity class="clickable" data-room="menu"
      geometry="primitive: plane; height: 0.5; width: 1.2"
      material="color: black; opacity: 0.01"
      position="0 0.8 -3">

      <a-text value="BACK" color="white" align="center"></a-text>
    </a-entity>

  </a-entity>

  <!-- 🛒 SHOP ROOM -->
  <a-entity id="shopRoom" visible="false">

    <a-text value="🛒 SHOP ROOM"
      color="#00ffff"
      position="0 1.6 -3"
      align="center"
      width="8"></a-text>

    <a-entity class="clickable" data-room="menu"
      geometry="primitive: plane; height: 0.5; width: 1.2"
      material="color: black; opacity: 0.01"
      position="0 0.8 -3">

      <a-text value="BACK" color="white" align="center"></a-text>
    </a-entity>

  </a-entity>

  <!-- ✨ MAGIC ROOM -->
  <a-entity id="magicRoom" visible="false">

    <a-text value="✨ MAGIC ROOM"
      color="#ffff00"
      position="0 1.6 -3"
      align="center"
      width="8"></a-text>

    <a-entity class="clickable" data-room="menu"
      geometry="primitive: plane; height: 0.5; width: 1.2"
      material="color: black; opacity: 0.01"
      position="0 0.8 -3">

      <a-text value="BACK" color="white" align="center"></a-text>
    </a-entity>

  </a-entity>

</a-scene>

<script>

// 🧭 ROOM SYSTEM
function goRoom(room) {

  document.getElementById("menuRoom").setAttribute("visible", false);
  document.getElementById("gamesRoom").setAttribute("visible", false);
  document.getElementById("shopRoom").setAttribute("visible", false);
  document.getElementById("magicRoom").setAttribute("visible", false);

  const banner = document.getElementById("banner");

  if (room === "menu") {
    document.getElementById("menuRoom").setAttribute("visible", true);
    banner.setAttribute("visible", true);
  }

  if (room === "games") {
    document.getElementById("gamesRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }

  if (room === "shop") {
    document.getElementById("shopRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }

  if (room === "magic") {
    document.getElementById("magicRoom").setAttribute("visible", true);
    banner.setAttribute("visible", false);
  }
}

// 🧠 CLICK SYSTEM (FIXES BACK BUTTON + MENU)
document.addEventListener("DOMContentLoaded", () => {

  document.querySelectorAll(".clickable").forEach(el => {
    el.addEventListener("click", () => {
      const room = el.getAttribute("data-room");
      if (room) goRoom(room);
    });
  });

});

</script>

</body>
</html>
